<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>桜（高コンメン）スケジュール 2026</title>
<style>
  :root{
    --paper:#f6f3ec;
    --staff:#e4ddc9;
    --ink:#232733;
    --ink-soft:#5b5f6b;
    --sakura:#c96b8a;
    --sakura-deep:#a5486a;
    --brass:#b08d57;
    --brass-deep:#8a6a38;
    --baseball:#4f7ea8;
    --baseball-deep:#3c6488;
    --burgundy:#7a2e2e;
    --navy:#233255;
    --leaf:#4f6d4f;
    --card:#ffffff;
    --line:#ddd6c3;
    --shadow: 0 8px 24px rgba(35,39,51,0.08);
  }
  *{box-sizing:border-box; min-width:0;}
  html{overflow-x:hidden;}
  body{
    margin:0;
    overflow-x:hidden;
    background:
      repeating-linear-gradient(180deg, transparent 0 39px, var(--staff) 39px 40px),
      var(--paper);
    font-family: "Hiragino Mincho ProN","Yu Mincho", serif;
    color:var(--ink);
    padding: 20px 10px 50px;
  }
  .wrap{max-width:920px;margin:0 auto; width:100%;}
  header{ text-align:center; margin-bottom: 18px; }
  header .clef{
    font-size: 34px; color: var(--sakura-deep); display:block; margin-bottom:2px;
  }
  h1{
    font-size: clamp(19px, 4.5vw, 28px);
    letter-spacing: .03em; margin: 0; color: var(--navy); font-weight: 700;
  }
  .sub{
    font-family: "Hiragino Kaku Gothic ProN", sans-serif;
    font-size: 12.5px; color: var(--ink-soft); margin-top: 6px;
  }
  .month-toggle{
    display:flex; justify-content:center; gap:10px; margin: 18px 0 14px;
    font-family: "Hiragino Kaku Gothic ProN", sans-serif;
  }
  .month-toggle button{
    border: 1.5px solid var(--sakura); background: var(--card); color: var(--navy);
    padding: 8px 22px; border-radius: 999px; font-size: 14px; font-weight:600;
    cursor:pointer; transition: all .15s ease;
  }
  .month-toggle button.active{ background: var(--sakura-deep); border-color: var(--sakura-deep); color: #fff; }
  .legend{
    font-family: "Hiragino Kaku Gothic ProN", sans-serif;
    display:flex; flex-wrap:wrap; justify-content:center; gap: 8px 14px;
    font-size: 11.5px; color: var(--ink-soft); margin-bottom: 16px;
  }
  .legend span{display:flex;align-items:center;gap:5px;}
  .dot{width:9px;height:9px;border-radius:50%;display:inline-block;flex-shrink:0;}
  .grid{
    background: var(--card); border-radius: 14px; box-shadow: var(--shadow);
    padding: 8px; border: 1px solid var(--line); width:100%; overflow:hidden;
  }
  .weekdays{
    display:grid; grid-template-columns: repeat(7, minmax(0,1fr));
    font-family:"Hiragino Kaku Gothic ProN", sans-serif; font-size: 11px;
    color: var(--ink-soft); margin-bottom: 6px;
  }
  .weekdays div{text-align:center;padding:4px 0;font-weight:600;}
  .weekdays div:first-child{color:var(--burgundy);}
  .weekdays div:last-child{color:var(--navy);}
  .days{ display:grid; grid-template-columns: repeat(7, minmax(0,1fr)); gap: 3px; width:100%; }
  .day{
    min-height: 70px;
    min-width: 0;
    overflow: hidden;
    border: 1px solid var(--line); border-radius: 7px; padding: 4px 3px 5px;
    cursor:pointer; background: #fffdf9;
    transition: transform .1s ease, box-shadow .1s ease;
    display:flex; flex-direction:column; position:relative;
  }
  .day:hover{ transform: translateY(-1px); box-shadow: 0 4px 10px rgba(35,39,51,.10); }
  .day.empty{ background:transparent; border:none; cursor:default; }
  .day.empty:hover{ transform:none; box-shadow:none; }
  .day .num{
    font-family:"Hiragino Kaku Gothic ProN", sans-serif; font-size: 12.5px; font-weight:700; color: var(--ink);
    width:20px; height:20px; line-height:20px; text-align:center;
  }
  .day.sun .num{color:var(--burgundy);}
  .day.sat .num{color:var(--navy);}
  .day.today{ box-shadow: 0 0 0 2px var(--sakura-deep) inset; background: #fdf1f5; }
  .day.today .num{
    background: var(--sakura-deep);
    color:#fff !important;
    border-radius:50%;
  }
  .day .practice{
    margin-top: 3px;
    font-family:"Hiragino Kaku Gothic ProN", sans-serif;
    font-size: 9.5px;
    font-weight: 600;
    color: var(--sakura-deep);
    line-height:1.3;
    overflow-wrap:anywhere;
    word-break:break-all;
    display:-webkit-box;
    -webkit-line-clamp:4;
    -webkit-box-orient:vertical;
    overflow:hidden;
  }
  .day .badge{
    margin-top: 2px;
    font-family:"Hiragino Kaku Gothic ProN", sans-serif;
    font-size: 8px;
    font-weight:700;
    display:inline-block;
    padding: 1px 4px;
    border-radius: 999px;
    color:#fff;
    max-width:100%;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .day.off .practice{ color: var(--ink-soft); font-weight:500; }
  .day.contest{ background: linear-gradient(180deg,#fbeceb,#fffdf9 60%); border-color: var(--burgundy); }
  .day.camp{ background: linear-gradient(180deg,#eef3ec,#fffdf9 60%); border-color: var(--leaf); }
  .day.hall{ background: linear-gradient(180deg,#fbf3e3,#fffdf9 60%); border-color: var(--brass); }
  .badge.contest{background:var(--burgundy);}
  .badge.camp{background:var(--leaf);}
  .badge.hall{background:var(--brass-deep);}
  .badge.baseball{background:var(--baseball-deep);}

  .overlay{
    position:fixed; inset:0; background: rgba(35,39,51,.45);
    display:none; align-items:center; justify-content:center; padding: 20px; z-index: 50;
  }
  .overlay.show{display:flex;}
  .modal{
    background: var(--card); border-radius: 16px; max-width: 440px; width:100%;
    max-height: 82vh; overflow-y:auto; padding: 22px 22px 24px;
    box-shadow: 0 20px 50px rgba(0,0,0,.25); position:relative;
  }
  .modal .close{
    position:absolute; top:10px; right:10px;
    width:40px; height:40px;
    display:flex; align-items:center; justify-content:center;
    background:#f1ede4;border:none;
    font-size:22px;color:var(--ink-soft);cursor:pointer;
    border-radius:50%;
    z-index:10;
    -webkit-tap-highlight-color: rgba(0,0,0,0.1);
  }
  .modal h2{ margin:0 0 3px; font-size: 19px; color:var(--navy); }
  .modal .wd{ font-family:"Hiragino Kaku Gothic ProN", sans-serif; font-size: 12px; color: var(--ink-soft); margin-bottom: 14px; }
  .block{
    font-family:"Hiragino Kaku Gothic ProN", sans-serif; margin-bottom: 12px;
    padding: 10px 12px; border-radius: 10px; background: #fbeef1; border-left: 3px solid var(--sakura-deep);
  }
  .block.contest{ border-left-color: var(--burgundy); background:#fbf0ef; }
  .block.camp{ border-left-color: var(--leaf); background:#f1f5ef; }
  .block.hall{ border-left-color: var(--brass); background:#fbf3e3; }
  .block.school{ border-left-color: var(--navy); background:#eef1f7; }
  .block .label{
    font-size: 10.5px; font-weight:700; letter-spacing:.05em; color: var(--ink-soft);
    margin-bottom: 3px; text-transform:uppercase;
  }
  .block .txt{ font-size: 13.5px; line-height:1.6; color: var(--ink); white-space:pre-line; }
  .empty-msg{ font-family:"Hiragino Kaku Gothic ProN", sans-serif; font-size: 13px; color: var(--ink-soft); text-align:center; padding: 10px 0; }
  .day-nav{
    display:flex; justify-content:space-between; gap:8px;
    margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--line);
  }
  .nav-btn{
    flex:1;
    font-family:"Hiragino Kaku Gothic ProN", sans-serif;
    font-size: 13px; font-weight:600;
    padding: 10px 8px;
    border-radius: 10px;
    border: 1.5px solid var(--sakura);
    background: #fff;
    color: var(--sakura-deep);
    cursor:pointer;
    -webkit-tap-highlight-color: rgba(0,0,0,0.1);
  }
  .nav-btn:active{ background: var(--sakura); color:#fff; }
  footer{
    text-align:center; margin-top: 24px; font-family:"Hiragino Kaku Gothic ProN", sans-serif;
    font-size: 11px; color: var(--ink-soft); line-height:1.7;
  }
</style>

function getRealToday(){
  const now = new Date();
  return { y: now.getFullYear(), m: now.getMonth()+1, d: now.getDate() };
}
const REAL_TODAY = getRealToday();
let currentMonth = (REAL_TODAY.y===2026 && REAL_TODAY.m===8) ? 8 : 7;

function setMonth(m){
  currentMonth = m;
  document.getElementById('btn7').classList.toggle('active', m===7);
  document.getElementById('btn8').classList.toggle('active', m===8);
  render();
}

function cellClass(ev){
  let cls = '';
  if(ev.contest) cls += ' contest';
  else if(ev.camp) cls += ' camp';
  else if(ev.hall) cls += ' hall';
  if(ev.off) cls += ' off';
  return cls;
}

function badgeFor(ev){
  if(ev.contest) return '<span class="badge contest">本番</span>';
  if(ev.camp) return '<span class="badge camp">合宿</span>';
  if(ev.hall) return '<span class="badge hall">ホール練習</span>';
  if(ev.sakura && ev.sakura.includes('野球応援')) return '<span class="badge baseball">野球応援</span>';
  return '';
}

function render(){
  const wrap = document.getElementById('days');
  wrap.innerHTML = '';
  const m = DATA[currentMonth];
  for(let i=0;i<m.startWeekday;i++){
    const d = document.createElement('div');
    d.className='day empty';
    wrap.appendChild(d);
  }
  for(let day=1; day<=m.days; day++){
    const ev = m.events[day] || {};
    const weekday = (m.startWeekday + day - 1) % 7;
    const cell = document.createElement('div');
    const isToday = (REAL_TODAY.y===2026 && REAL_TODAY.m===currentMonth && REAL_TODAY.d===day);
    cell.className = 'day' + (weekday===0?' sun':'') + (weekday===6?' sat':'') + cellClass(ev) + (isToday?' today':'');
    cell.onclick = () => openModal(day);
    const practiceShort = (ev.sakura || '').split("\n")[0];
    cell.innerHTML = `
      <div class="num">${day}</div>
      <div class="practice">${practiceShort}</div>
      ${badgeFor(ev)}
    `;
    wrap.appendChild(cell);
  }
}

const weekdayNames = ['日','月','火','水','木','金','土'];

function openModal(day, month){
  if(month && month !== currentMonth){
    setMonth(month);
  }
  const m = DATA[currentMonth];
  const ev = m.events[day] || {};
  const weekday = (m.startWeekday + day - 1) % 7;
  const modal = document.getElementById('modal');

  let blocks = '';
  if(ev.sakura){
    const cls = ev.contest ? 'contest' : (ev.camp ? 'camp' : (ev.hall ? 'hall' : ''));
    blocks += `<div class="block ${cls}"><div class="label">桜（高コンメン）の予定</div><div class="txt">${ev.sakura}</div></div>`;
  }
  if(ev.baseball){
    const isCheerDay = ev.sakura && ev.sakura.includes('野球応援');
    const label = isCheerDay ? '野球応援・大会情報' : '参考：野球部の試合日程（この日、桜は応援ではありません）';
    blocks += `<div class="block"><div class="label">${label}</div><div class="txt">${ev.baseball}</div></div>`;
  }
  if(ev.other){
    blocks += `<div class="block"><div class="label">担当・備考</div><div class="txt">${ev.other}</div></div>`;
  }
  if(ev.school){
    blocks += `<div class="block school"><div class="label">学校行事</div><div class="txt">${ev.school}</div></div>`;
  }
  if(!blocks){
    blocks = `<div class="empty-msg">この日の記載はありません</div>`;
  }

  const prevInfo = getAdjacentDay(currentMonth, day, -1);
  const nextInfo = getAdjacentDay(currentMonth, day, 1);

  modal.innerHTML = `
    <button class="close" onclick="closeModal()">×</button>
    <h2>${currentMonth}月${day}日</h2>
    <div class="wd">${weekdayNames[weekday]}曜日</div>
    ${blocks}
    <div class="day-nav">
      <button class="nav-btn" onclick="openModal(${prevInfo.day}, ${prevInfo.month})">← 前の日</button>
      <button class="nav-btn" onclick="openModal(${nextInfo.day}, ${nextInfo.month})">次の日 →</button>
    </div>
  `;
  document.getElementById('overlay').classList.add('show');
}

function getAdjacentDay(month, day, delta){
  let newDay = day + delta;
  let newMonth = month;
  if(newDay < 1){
    newMonth = 7; // 8月の前は7月のみ想定
    newDay = DATA[7].days;
  } else if(newDay > DATA[month].days){
    newMonth = 8; // 7月の次は8月のみ想定
    newDay = 1;
  }
  return { month: newMonth, day: newDay };
}

function closeModal(){
  document.getElementById('overlay').classList.remove('show');
}
document.addEventListener('keydown', function(e){
  if(e.key === 'Escape') closeModal();
});

document.getElementById('btn7').classList.toggle('active', currentMonth===7);
document.getElementById('btn8').classList.toggle('active', currentMonth===8);
render();
</script>
</body>
</html>
